name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Go fmt check
        run: test -z "$(gofmt -l .)"
      - name: Go build
        run: go build ./...
      - name: Go test
        run: go test ./...

